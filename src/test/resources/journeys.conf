# Configure here your journeys. A journey is a sequence of requests at a certain load.

journeys {


 login = {
        description = "Login"
        load = 0.1
        parts = [
          login
      ]
  }

  manageOrg = {
        description = "Manage organisation"
        load = 0.1
        parts = [
          manage-organisation
      ]
  }

  newClaim = {
        description = "New claim"
        load = 0.1
        parts = [
          login,
          manage-organisation,
          claim-details,
          purchase-details
      ]
  }

  newClaimGermany = {
        description = "New claim for Germany"
        load = 0.1
        parts = [
            login,
            manage-organisation,
            claim-details-germany,
            purchase-details-germany
        ]
    }

  deleteClaim = {
        description = "Delete claim"
        load = 0.1
        parts = [
            login,
            manage-organisation,
            delete-claim,
            manage-organisation
         ]
     }

  allJourneys = {
        description = "All"
        load = 0.1
        parts = [
          login,
          manage-organisation,
          claim-details,
          purchase-details
      ]
  }
}

# Default behaviour is to run all journeys. If that is not what you need you can specify the list of journeys to run
  journeysToRun = [
        newClaim
        newClaimGermany
        deleteClaim
#        allJourneys
      ]

# You can specify the same list of journeys via environment variables:
# journeysToRun.0 = hello-world-1
# journeysToRun.1 = hello-world-3
